body:
  text: 太上飛行九晨玉經遜十太上大道君告北極眞公曰吾昔遊於北天䇿駕廣寒足踐華蓋手排九元逸景雲宮遨戯北玄逍遥朔隂之館賞于洞毫之門盻璇璣以召運促劫㑹以儛輪歎萬物之凋衰俯天地之長存乃覺九星之竒妙悟斗魁之至靈也夫九星者寔九天之靈根日月之明梁萬品之淵宗也故天有九氣則以九星爲其靈細地有九州則以九星爲其神主人有九孔則以九星爲其命府隂陽九宮則以九星爲其門戸五嶽四海則以九星爲其淵府五九參列綱維無窮制御天宿廻轉三辰調理四五致天地得存萬品之所宗神仙之所憑夫天無九星則無以爲高清地無九星則無以爲至靈人無九星則九孔不明上帝兼之以通眞神仙憑之以得成五行乗之以致度物禀之以得生也天清地靜則九星煥明天激地否則九星翳昏璇璣召劫度之期天關運五行之氣輪空洞之大輻促九天之應㑹是以神光轉灼玄監萬生傍行越位以告災祥天地所以有大運之交百六應符皆九星緯轉數終所以隂陽勃蝕二氣否激天翻地覆九海冥一金玉化消毫末不失也悉九星之所廻璇璣之所促明天地之用玄綱之妙得其中則有空常隱歩藏景逃形變化三辰萬物立成黒㸃隱淪二十五名其趣幽微祕不下傳上有九晨華君中有九皇夫人魂精魄靈皆九斗之威神吐煥七曜之光流映九天之門洞朗幽虚無毫不彰也其星陽芒則爲流金火鈴隂芒則爲豁落七元皆高上之靈䇿元始之威章也龍飛尺素之訣隱諱口口之中列帛華晨之下羊鴈禮天以招眞則玄光曲照于盟場九晨下降於靈宇夫人懽恱於寢席玄斗記名於隱書有知此道存之便足以免大劫之㑹度洪災於甲申也修之二七年便得晏鴻翮而騰翔斥紫霄而升晨也此玉清之上道不比上清之中仙也玉清則上清之高眞上清則太清之高神太清則飛仙之高靈凡行玉清之道出則諸天侍軒給玉童玉女各三千人建三七色之節駕紫雲飛軒十二瓊輪前導鳯歌後從玄鈞六師啓路飛龍翼轅其位准高仙列圖玉清行上清之道出則五宿侍衞給玉童玉女各一千五百人建紫毛之節駕飛雲丹輿前吹鳯鸞後奏天鈞玄龍啓道五帝參軒位准上清左右位卿行太清之道出則五帝侍衞給玉童玉女各八百人建五色之節駕龍輿飛煙前嘯九鳯後吹八鸞白虬啓道太極參軒故眞中有髙卑玄中有階次也玉清之道玄逺絶邈不比中眞及飛仙之徒九星上法玄映之道吾昔受之於元始于今七億萬劫經天地成敗萬品衰滅而其道獨存今猶修之於雲景之上而不能忘之於時節者意玩此道高妙愛樂夫人接遇也况來生始學飛晏之舉而不知幽尋歩空之法何由得披重霄之門觀天地之始終乎旣無此道與九晨乖域夫人絶遊也徒有玄名帝録超卓髙騰正可得䇿駕雲龍遊盻五嶽但不死而巳如此望踐斗魁旋歩華晨騰景玉清當未有期也子方當匡御劫運封掌十天科簡玄録理判神仙宜受此法以綜萬生今出相付子祕而修焉九晨眞人曰行飛歩之道先一日沐浴齋淨是日於中庭布星圖隨斗建也北向長跪燒香於玄冥星下叩齒三十六通閉眼存歲星在左脇太白星在右脇熒惑星在頭上辰星在臍下鎭星在心次覆衣九星先舉左手屈於頭上如斗勢存陽明星在左手掌中隂精星在左肘上眞人星在左乳上玄冥星當心故燒香於玄冥星下而啓事因心而應天明也丹元星在右䏶上北極星在右膝頭上天關星在右足肧上輔星在臍下弼星在頭上畢微呪曰衣天斗戴金巾乗魁剛入斗門朝眞人拜華晨二十八宿覆絡我身乗空𡵯虚飛升自然畢咽氣九過止次舉右手如斗勢臨頭上存陽明還右手掌中隂精星右肘上眞人星在右乳上玄冥星當心上丹元星在左䏶上北極星在左膝頭上天關星在左足肧上弼星在左目上輔星在右目上畢微呪曰我乗天剛歩九元履斗魁行飛仙得天心萬神懽隱形藏景變化萬端敢有干試收繫斗門掃除不祥正眞明分左煥火鈴右輝靈幡威光萬里嘯命立前玉帝所呪靡不如言畢咽氣十六過止次乗斗旋行斗星之外歩斗魂魄從天樞星上對陽明次登天璇天璣以次周於隱元往反三過畢於隱元星上歌三洞飛空章而登陽明也便立思夫人形象如左也第一天樞星則陽明星之魂神也天樞星威而不曜光而不照潜洞太虚圍九百二十里對陽明星之西北門其星則號元斗宫魁精玄上眞皇夫人姓明通諱甖玄眞名上精頭建飛雲華頽之髻餘髮散至腰衣紫黄青三色之䙱帶九鈴之綬口恒吐青氣之光以注於陽明星上以明星之煥也修飛歩之道當思夫人姓諱形像然後呪則魂神澄正明星懽恱天光洞映使魂影俱飛登晨也并足上天樞星上對陽明星左手撫心右手指陽明星叩齒九通咽液九過閉氣三息而微呪曰天妃九星凝氣結眞七曜纏絡號曰玉晨上建華蓋下躡斗魁身乗天機飛歩瓊軒魂精魄靈與形合仙保元日月天地長存隨運變化夫人齊連上升九天浮景自然畢閉氣三息次左足躡天璇進右足與左足并通氣第二天璇星則隂精星之魂神也天璇星景而逺映照而不煥潜洞太虚圍五百五十里對隂精星之西門其星則號玄斗宮虚精上玄皇夫人姓玄鏡諱鬱勃光眞名金歸頭建飛雲華頽之髻餘髮散至腰衣飛錦羅裙鳯文錦帔帶靈飛紫綬口恒吐黒氣之光以注於隂精星上以明星之暉曜也修飛歩之道當思夫人姓諱形像并足上天璇星上對隂精星左手撫心右手指隂精星叩齒九通咽液九過閉氣九息而微呪曰北玄皇靈九上開清玉華潜映緯絡紫庭今日飛歩萬道通明魂魄澄正安附我形無使飛翔同升北星上噏玄精飲以玉泉變化九微保命天靈畢閉氣三息次進左足躡天璣星次右足來幷通氣第三天璣星則眞人星之魄精也天璣星猛而不顯暉而不曜潜洞太虚圍七百七十里對眞人星之東南門也其星則號上精宮靈妃元皇夫人姓常明諱化雲眞名流爓頭建晨嬰寳冠衣飛雲明光錦䙱帶六山飛晨之綬口恒吐黄氣之精以注眞人星上以明星之曜也修飛歩之道當思夫人姓諱形像幷足上天機星上對眞人星右手撫心左手指眞人星叩齒九通咽液九過閉氣十二息而微呪曰靈妃元皇九星中眞上理璣度總監諸天下試羣方遊景紫煙是日上吉黄道敷陳潤流九外曲灑我身飛行禹歩上入帝晨與皇同眉永享劫年畢閉氣三息次進左足躡天權星進右足與左足幷通氣第四天權星則玄冥星之魄精也天權星微而隱隱而同映潜煥太虚圍八百里對玄冥星之東門也其星則號綱極宮上靈神妃華皇夫人姓開生諱運明眞名嬰關頭建七稱之冠衣緋羅鳯文之䙱帶金眞玉光口恒吐赤氣之精以注玄冥星上以明星之煥曜也修飛歩之道當思夫人姓諱形像幷足上天權星上對玄冥右手撫心左手指玄冥叩齒九通咽液三過閉氣三息而微祝曰神妃上靈號曰華皇安鎭華蓋北上之宮左侍玉女右衛靈童道引七精九暉之光爲我致眞飛歩天剛使我魂魄俱升帝堂畢閉氣三息次進左足躡玉衡進右足與左足幷通氣第五王衡星則丹元星之魂靈也玉衡星大而嘿踊而不煥潜洞太虚圍七百二十里對丹元星東北門也其星則號紀明宮北上金蓋中皇夫人姓元方諱神武眞名勃頭建紫晨飛華之冠衣九色之䙱帶神虎玉文口恒吐白氣之光以注丹元星上以明星之暉也修飛歩之道當思夫人姓諱形像幷足上天衡星上對丹元星右手撫心左手指丹元流齒三通咽液三過便閉氣三息而微呪曰皇華中妃上元所居九斗吐暉精煥八竭流煙鬱勃散靈朱廬使我魄靈天地同符形魂俱升駕空䇿虚玉光緒絡丹軿紫輿飛行北上參受隱書畢閉氣三息次進左足躡闓陽星進右足與左足並通氣第六闓陽星則北極星之魄靈也闓陽星朗而潜照暉而不煥洞微太虚圍七百七十里對北極之下開北洞之門也其星則號紫極宮安上晨華元皇夫人姓王元諱根華眞名㝠㑹頭建玉晨進賢之冠衣飛青羽䙱帶流金火鈴口恒吐緑氣之精以注北極星上以明星之曜暉也修飛歩之道當思夫人姓諱形像拜足上闓陽星上對北極星而左手撫心右手指北極叩齒三通咽液五過閉氣五息而微呪曰九天上帝黄華之宗運轉璇璣總輪八方使我飛歩躡紀天綱反覆交幷三五縱横通靈八微羽衣玄黄龍輿玉景飛行太空長享眉壽天地同功畢閉氣五息次左足躡摇光星進右足幷通氣第七摇光星則天關星之魂太明也摇光星則光轉空洞廻旋天關也潜煥太虚圍九百里上對天關星之南門下對北極星也其星則號運天宮玉華靈皇夫人姓度元諱終㑹眞名啓光頭建飛華頽雲之髻餘髮散至腰衣七色夜光雲錦之裙九色錦帔九天威靈玉䇿口恒吐赤氣之精注天關星上以明星之大光也修飛歩之道當思夫人姓諱形像幷足上摇光星上對天關星而左手撫心右手指天關叩齒九通咽液九過閉氣三息而微呪曰天地廻轉七光大明旋輪九氣上應玉清中有夫人號曰華靈玄映九外無毫不生是日良吉飛歩紫庭使我魂魄安附身形變化空洞出幽入冥天地同輪萬劫不傾保仙上元九晨齊精畢閉氣七息次左足躡洞明星進右足幷通氣第八洞明星則輔星之魂精陽明也洞明星則光廻諸天總輪上宿流暢太虚圍九百九十里上對輔星西南門也在天關之上梁北極之陽芒也其星則號空眞宮太明常皇夫人姓幽昇諱无韻眞名空變頭建飛雲華頽之髻餘髮散至腰衣飛羅文䙱帶九光之綬口恒吐青氣之精注於輔星之上以常陽大光也修飛歩之道當思夫人姓諱形像幷足上洞明星上對輔星而右手撫心左手指輸星叩齒九通咽液九過閉氣三息而微呪曰三五飛行天地開張九元廻綱合紐上京天眞散靈萬道溢昌夫人曲映是日吉良飛歩斗魂旋行玉綱頭戴華蓋足履常陽遊戯三清變化萬方保仙自然享壽無窮畢閉氣十二息次左足躡隱元星進右足幷通氣第九隱元星則弼星之魂明空靈也隱元星則隱息華蓋之下潜光曜於空洞之中圍九百九十里上對弼星之東南門也其星則號元寳宫空玄變靈上皇夫人姓冥通諱萬先眞名常陽頭建飛雲七稱玉冠衣青文錦䙱帶九光夜燭口恒吐黒氣之精注於弼星之上以明煥隱洞之光也修飛歩之道當思夫人姓諱形像幷足上隱元星上對弼星而左手撫心右手指弼星叩齒十二通咽液一過閉氣一息而微呪曰上歩天綱飛行羽門出入三生逃身隱淪變化形影千合萬分神安氣鎭鍊度仙魂舉體同飛衣服錦裙流鈴交落身佩虎文嘯咤五帝䇿駕景雲上造北辰朝謁皇君畢閉氣一息止還幷足上天樞星上單歩往反三周不須復存思呪說也歩斗魂事畢存呪正初登星一過行之爾往反三過畢還立天樞星上向陽明星而歌誦徘徊遊行九晨羽章三篇畢便登綱上陽明星上行飛歩也羽章詞如左雲綱落天紀九斗翠玉虚紫蓋重霄嶺玄精朗八嵎上有九晨賔吟詠隱與書飛歩遨北漢長齡天地居控轡玄羽臺飛行九元所洞虚深幽邃雲綱乗空舉下有採眞士仰照玉晨府三周陽明上九廻入洞野高歩登帝尊長歌龍飛語玉霄映北朔瓊條翠隱柯空生九靈臺煥精曜太遐天關運重冥劫㑹屢經過乗我羽行駕飛歩織女河保靈空常化永忘天地多此三章出玉清上宮諸九陽玉童九華王文皆恒歌誦之於華晨之上以和形魂之交暢啓靈眞於幽關也凡修飛歩七元行九星之道無此歌章皆不得妄上天綱足躡玄斗也犯之九星則執子魂魄閉於斗綱之下也令人猖狂失性嗔怒妄興不出三年無不喪身非道不欲使人得仙而人不能明道淵源耳如此豈可不詳而行焉九星則九天之根玉清之明精九魂則九星之明靈人徒知歩七星之妙而不知九星魂魄之至靈也非七星不欲運人上斗而人身魂神畏斗星之靈魄不敢隨人而騰空也欲修飛歩之道宜知斗星之魂魄九皇夫人内名空常之隱訣也而按圖修行豈當不得飛登北元上謁華晨者哉但此道高妙玉清寳祕不行中仙鮮有得者知其法則九星内映夫人降席斗魂感恱則共攜兆而升入九元之内宮陽明星天之太尉司政主非上總九天上眞中監五嶽飛仙下領後學眞人天地神靈功過輕重莫不𨽻焉星圍九百二十里皆瑠璃水晶中有玉樹青實金翅之鳥棲宿其上自生青精玉芝食之一口壽九萬年星有九門有四光芒皆爓照九億萬里中上有青城玉樓據斗眞人號曰太上宫青城玉樓九晨君姓上雲諱法嬰容字董洞陽摇天槌頭建九晨玉冠衣青羽飛裳手執斗中玄圖坐玉樓之中有玄名玉録當得知九晨君内諱知者玉晨下映明星玄降修其道飛行太空升入九門之内也修飛歩之道當先於陽明星上右手撫心左手指天東北閉氣九息叩齒九通咽液三過閉眼思九晨君姓諱形像留立陽明星上便微祝曰飛天九晨上據玄魁威振八煥司政紏非今日飛歩萬道通開九眞齊景天轉地廻鬼謀戳頸人逆斬摧三綱所捕逆者將衰神靈侍衞享福巍巍得天之心骨化形飛手攀七綱足踐九扉雲行雨歩上昇太微畢左轉陽明星上九廻立向鬼門閉氣三息轉左足躡隂精進右足幷於隂精星上通氣隂精星天之上宰主禄位上總天宿下領萬靈及學仙之人諸學道及兆民宿命禄位莫不𨽻焉星圍五百五十里亦皆瑠璃水精中有玉樹黒實金翅之所棲自生玄芝玉飴食之一口得壽五萬年星有五門門有四光芒爓照九億萬里中上有五色玉樓攀魁眞人號曰中元宮五色玉樓北上晨君姓育嬰諱玄上瓫字昌陽文激明光頭建玄精玉冠衣玄羽飛裳手執五色羽節坐玉樓之中若有玄名朱臺當得知上晨君内諱知者則北上下映隂精玄降修行其道則飛行太空昇入五門之内也修飛歩之道當先於隂精星上左手指本命右手撫心閉氣五息叩齒五通咽液五過閉目思北上晨君諱字形像留立隂精星上便微呪曰玄晨北靈五氣上精體隱六紀心藏景星日月俠映三光飭形今日元吉歩綱紫庭上開天戸受福朱靈享祚無極禄位尊榮萬願交覆所向利貞騰飛華蓋遨翔玉清上詣北晨九眞齊軿畢左轉隂精星上五廻向本命上立閉氣三通轉左足躡弼星進右足幷通氣不得躡眞人星但躡弼星耳眞人星天之司空主神仙上總九天高眞中監五嶽靈仙下領學道之人眞仙之流莫不𨽻焉星圍七百七十里亦皆瑠璃水精中有玉樹黄實金翅之所棲自生黄精玉芝食之一口得壽三千萬歲星有十二門門有四光芒爓照九億萬里中上有黄臺玉樓眞人號曰眞元宮中黄臺玉樓主仙華晨君姓歸㻂諱妙隂光字通度元度凝脂頭建飛晨寳冠衣青羽飛裳手執斗中青籙坐玉樓之中若有玄名方諸當得知華晨君内諱知者則華晨下映眞人玄降修行其道則飛行太空昇入十二門之内也修飛歩之道皆不得躡眞人星也當幷足弼星上所謂偃息華蓋者也北老眞公曰子欲騰身勿干眞人子欲飛行勿枉天綱子欲神仙當拜華晨行道當避眞人星立弼星之上拜眞人朝華晨而求飛空也弼星曰空輔星曰常常者常陽空者隱藏其有諱不得傳於人口可於華晨之下羊鴈禮天裂素盟而傳得此祕諱心存而行之輕泄七祖負考風刀也當於弼星上右手撫心左手指西北閉氣九息叩齒九通咽液九過閉眼思主仙華晨君姓諱形像留立眞人星上便微呪曰太微通眞弼輔華晨吐煥九精結氣紫煙飛霞流映光曜十天上理元衡下攜神仙今日飛𡵯請禮眞人一求空行二乞隱身三願上昇北掖四便龍衣羽服錦帔青裙駕乗八景浮遊九玄得入天宿與帝同軒畢左廻弼星七過向眞人閉氣三息轉左足躡玄冥進進足幷通氣玄冥星天之遊擊主伐逆上總九天鬼神中領北帝三官下監萬兆伐逆不臣諸以凶勃莫不𨽻焉星圍八百里亦皆瑠璃水精中有玉樹赤實金翅之所棲自生丹芝流瑛食之一口得壽八千萬年星有三門門有四光芒爓照九億萬里中上有朱臺玉樓出斗眞人號曰紐幽宫中朱臺玉樓玄上飛蓋晨君姓冥樞諱定宣覺字法明度摇天柱頭建三華寳晨冠衣丹錦飛裳手執命靈之節坐玉樓之中若有玄名玉格當得知飛蓋晨君内諱知者則飛蓋下映玄冥玄降修行其道則飛行太空昇入三門之内也修飛歩之道當先於玄冥星上右手撫心左手指天閉氣九息叩齒三通咽液三過閉眼思飛蓋晨君姓諱形像留立玄冥星上便微呪曰天眞行道歩景藏形七元煥落九晨齊幷手把天衡足踐飛星左輔火甲右御朱兵威振十天流煥上清先戮謀議後伐妖精敢有干正斬以刀刑三綱所制莫不伏聽變化往反適心華庭乗空飛歩上造帝靈畢左廻三轉向天閉氣三息轉左足踐丹元星進右足幷通氣丹元星天之斗君主命録籍上總九天譜籙中統鬼神部目下領學眞兆民命籍諸天諸地莫不總統星圍七百二十里亦皆瑠璃水精中有赤樹白實金翅之所棲自生金精冶鍊之膏食之一口得壽七萬年星有七門門有四光芒爓照九億萬里中上有素臺金樓躡紀眞人號曰綱神宮中素臺金樓躡紀眞人金魁七晨君姓上開諱冥通光字朱煥元變五道頭建七寳飛天冠衣白錦飛裙手執青元籙籍坐金樓之中若有玄名崑臺當得知七晨君内諱知者則七晨下映丹元玄降修行其道則飛行太空昇入七門之内也修飛歩之道當先於丹元星上右手撫心左手指天關閉氣七息叩齒三通咽液三過閉眼思七晨君姓諱形像留立丹元星上便微祝曰飛行躡紀上歩丹元乗魁落宿呼命斗䰟削死勒生青白簡分三合成道年命長延享利眉壽齊生華晨肉飛骨輕駕景乗雲仙衣羽服流鈴紛紛五色煥燿昇入七門畢廻星上七轉還向天關閉氣七息轉左足踐北極進右足幷通氣北極星天之太常主昇進上總九天眞中統五嶽飛仙下領學者之身凡功勤得道轉輪階級悉緫之焉星圍七百七十里亦皆瑠璃水精中有黒樹白子金翅之所棲自生玄芝水瑛食之一口得壽五萬年星有八門門有四光芒爓照九億萬里中上有玄臺玉樓歩綱眞人號曰紀明宮中玄臺玉樓北晨飛華君姓明靈諱長明化字淵源源昌上元頭建飛精華冠衣紫錦飛裳手執九斗玉䇿坐玉樓之中若有玄名金臺當得知飛華君内諱知者則飛華下映北極玄降修行其道則飛行太空上昇八門之内也修飛歩之道當先於北極星上右手撫心左手指金門閉氣八息叩齒三通咽液三過閉目思飛華君姓諱形像叩齒立北極上便微呪曰天行三五中元廻旋飛歩華蓋御斗乘晨落紀三命徘徊遊烟今日元吉上希神仙名書玉簡刋字紫篇青襦羽服丹帔錦裙八景丹輿運我昇軒位爲仙卿北上之君請求所呪靡不如言畢廻星工八轉還問西方閉氣八息轉左足踐天關進右足幷通氣天關星天之上帝主天地機運如四時長養天地否泰劫㑹莫不𨽻焉星圍九百里亦皆瑠璃水精中有三華之樹五色之實金翅之所棲生自然九味芝膏服之一口身生九色之光得壽九萬年星有一門門有九光芒總運九天之氣爓照九億萬里中上有九層玉樓乗龍眞人號曰開㑹宮九層玉樓總雲九元北蓋晨君姓玄樞諱轉光字㑹元終明天徒頭建九元寳冠衣九色錦裳手執暉神之章坐玉樓之中若有玄名九天帝圖玉籙當得知北蓋晨君内諱知者則北蓋君下映天關玄降修行其道飛行太虚昇入一門之内也修飛歩之道當於天關星上左手撫心右手指地戸閉氣一息叩齒三通咽液三過閉眼思北蓋晨君姓諱形像留立天關星上便微呪曰天元運關地紀轉維九靈交度三五相推四七幡宿五帝徘徊承玄歩虚上躡玉機衣斗履斗流鈴煥威順我者吉逆我者衰我行天眞萬里廓開身騰蒼軿魂昇形飛長離劫㑹昇入太微畢廻星上一轉還向地戸閉氣一息轉左足踐轉星進右足幷通氣輔星天尊玉帝之星也曰常常者常陽主飛仙上總九天下領九地五嶽四瀆神仙之官悉由之焉星圍九百九十里亦皆瑠璃水精中有青華之樹自有九音之字上有青鳥三足鳥坐自然瑠璃芝瑛食之一口得與玉帝同眞星有八門交通八氣門有四光芒爓照九天之上中有紫氣玉樓遊行三命眞人號曰帝席宫中紫氣玉樓帝尊九晨君姓精常諱常無瓫字玄解子空正上開延頭建飛精玉冠衣九色衣手執火鈴坐玉樓之中若有玄名上清得知帝尊内諱知者則帝尊下映輔星玄降修行其道飛行太空昇入八門之内也修飛歩之道當於輔星上右手撫心左手指熒惑星閉氣三息叩齒三通咽液三遇閉眼思帝尊姓諱形像留立輔星上便微呪曰乾坤交覆三命接靈上歩天宿飛行九星左把隱書右執羽經拜謁帝尊受帝之名得越華蓋騰翔紫庭今日行道萬慶交拜受福巍巍永享長生身變毛羽飛昇上清畢廻星上三過還向南方閉氣二息轉左足還踐弼星上進右足并通氣弼星太帝眞星也曰空空者恒空隱也主變化無方星圍九百九十里亦瑠璃水精中有三華之樹自生九天玉章上有金口之鳯口銜火鈴中生自然七曜之暉得食一口與太帝同眞星有九門交關九天門有四光芒爓照八極之外無央之中也中有玉臺紫館徘徊三陽眞人號曰上尊宮中玉樓紫館帝眞元晨君姓幽空諱空無先字隱元覺冥陽暉幽寥元頭建飛天玉冠衣九天龍衣手執帝章坐紫館之中若有玄明九天得知帝眞内諱知者則能隱形藏身修行其道則飛昇九門之内也修飛歩之道當於弼星上右手撫心左手指北辰星閉氣五息叩齒三通咽液七過閉眼思帝眞元晨君姓諱形像却立弼星上便微呪曰道合三微玄虚舉眞出常入空逃形天關浮翔八極駕景紫煙飛歩九天變化億千遨戯北蓋嘯命句陳所求所願靡不如言長齡天地保年華晨畢廻星上五轉還向北辰星閉氣七息左轉兩足還幷立陽明星上從陽明星單行禹歩周廻九星往反九廻止皆不須復存呪也畢還弼星上平坐偃息華蓋存九晨覆衣如初法閉眼思己身在絳雲之内乘天綱飛空上昇九天之門隨綱轉輪九過畢覺身如落空還坐星圖之上便以手拭目九過捻兩眼門九過而行周天大呪叩齒九通仰西北而呪曰高上九靈皇上華君緫仰天宿廻度三辰變化四節五行成仙是日行眞普命萬神五嶽四瀆及諸靈山天地水官悉衞我軒太陽激電六隂吐雲猛獸驅除萬精四奔毒龍食鬼平滅邪源謀我者刑干我者煩樂我者壽願我者仙我帶靈䇿體佩七元流金火鈴煥落我身頭戴華蓋足躡景雲口銜天精手握天關空常變化千合萬分金木水火立成自然飛行禹歩徘徊九門出入三清天地長存畢又叩齒三通咽液二七過都止九晨之道畢於此也行九晨之道當以正月七月四月十月四孟月同用上旬五九唯一日也平旦二月八月五月十一月四仲月同用中旬十五十九正中三月九月六月十二月四季月同用下旬二十五二十九夜半此一月六日旬適取其一日一月三過行之一年三十六過以應天關轉輪九天之氣三百六十度之數也以其日行道皆九天書名得過陽九百六之運身免洪波大劫之災九年乃得晏飛綱而上歩乗空紀而超足也九晨玄圖金簡文曰修飛歩九晨之道亦當依歩天綱之日兼而行之益求飛天之速玄斗屢鑒也若兼修者當先行九晨而後行歩天綱也此二法呪呪爲異原同一法歩天綱太微帝君昔授皇清洞眞君𡵯天綱飛地紀據玄斗攀星魁接九眞乗飛龍遊三命浮三生固三寳出六害隱六隂入六紀鎭天英守延期存元輔躡大弼用流丹房上昇文昌展轉九道位爲九老行之二十年受書爲上清眞人几人望七星爲近不知歩之甚逺道士苟知天綱之可歩而不知魂魄不追其身非身之不將魂魄也魂魄畏七星之威不敢追身而上行也故三魂不攝七魄蕩散徒以空尸歩綱而神不我從實徒勞也子欲歩綱澄心虚靜不思哀憂不念熒味於是廻行三帀登星啓祝使魂魄二神俱過靈關豁然縱體奄忽自忘盛潔乃歩恒如蹈空一年辟非二年辟兵三年辟死四年地仙千害萬邪衆莫敢干自此以往福慶無端致神使靈驂駕飛龍太極賜芝玉帝給童行二七年爲上清眞人歩法勿横行干綱也直畫連星之界分曰綱也犯横天綱皆伐斷天道大禁也歩綱勿躡眞人星大忌犯此二者皆脫巾叩頭謝綱象以布帛爲之長九尺廣六尺羅列星位於帛上以青筆爲星丹筆爲綱盛之潔箱毎欲施行燒香出之侍書有玉女七人衞星有玉童七人婦人歩綱用絳帛太微帝君教授歩天綱之經謹按神眞上法先燒香於行事之所閉氣七廻行斗星之外三帀始於隂精帀於陽明畢乃通氣始得足躡於七星身上歩於陽明耳於是向陽明星又閉氣而心祝曰陽明大魁玄極文昌使某魂魄俱遊天綱祝畢乃左足躡陽明又進右足躡隂精心祝曰隂精北極太上璇璣使某魂魄俱過神津次在足躡北極心祝曰北極天光廻適玄辰使某魂魄俱至玄關次右足躡天關進左足前與并乃通息大祝之一閉息不竟綱者可於丹元星上通息更閉微祝曰金木水火土五行相推七星煥煥天綱最威輔星鎭盛弼星却衰九眞太上太極太微三府玉帝三尊辟非天動地轉魂魄相隨使我飛仙眞光徘徊名入金房玉門乃開乗龍陟空日月同輝遊行上清鳴鈴翠衣左躡流電右御奔雷地上萬邪伏死敢追惡心視我使爾斬摧帝命玉女營侍以歸魂眞魄神合形升飛倒行法止於天關倒向北極微祝曰太上元辰華蓋紫靈北極玉房藏景化精太微玄臺九眞玉城願某飛仙得行雲庭反歩天綱魂魄俱生乗龍華宫得道之英左佩玉璫右腰金鈴虎帶龍裙嘯攝天兵乗景三素飛登上清祝畢乃閉氣舉左足躡北極右足躡丹元次舉左足躡玄冥前右足與左足拜而向眞人之星通息微祝曰太極九精上皇高眞出登元清入隱玄隂育某長某使某好仙玉臺忽開金堂八門乞某佩書絳龍青裙上佐紫微後聖之君乗十飛龍玄蓋景靈列名玄圖日月同并祝畢因又閉氣左足躡弼星進右足躡隂精又進左足躡陽明前右足與左足并乃通息微祝曰天魁正陽斗運低昻前轉元機後動靈綱制魄以寧拘魂以康魂魄與身俱行天堂向見金闕髙上太皇右扶仙母左扶仙公紫翠飛華龍袍虎裳帶眞巾玉項生圓光手把神鈴腰佩金鐺口詠洞眞七變妙章光自虚无生而爲王飛行九道據斗攀綱前從太一後從玄郎告某口訣坐在立亡反行至要位爲仙卿五藏自生與天相迎所願如念所求尅昌萬邪伏害易地隱藏惡我天伐水滅火喪反行法又閉氣右廻斗星之外三帀始於陽明帀於陽明通息祝曰高上太眞七耀至尊反行尋生上歩天元使某飛仙得入紫門因又閉氣左足躡陽明右足躡隂精先前右足躡玄冥左足躡丹元次右足躡北極左足躡天關右足前與拜乃通息祝曰七變返旋上行玉宿六紀輔我三綱合歩玉帝左盻髙上右顧教我乗星騰登玄路乞賜飛仙不死之祚遊行上清乗華三素金青翠裙出入九舍北皇見揖南眞見謝名書仙臺千變萬化得友聖君太平輔佐所願從心萬事成就有惡我者刀刑火墓順行倒行反行三道都畢乃又舉兩足俱上陽明星以右手撫心左手指玄冥星閉氣三息叩齒三七咽液三九名曰據斗微祝曰陽明太素立辰黄房中有大神左拊上皇右把高眞龍銜翠衣飛錦虎文腰帶玉符首戴蓮冠出無入虚金眞玉光靈尊巍峩號曰陽明足躡朱烟口詠洞章賜某隱書見教歩綱周行三復據斗自忘使某飛仙超虚浮空名書上清乗玄駕龍意有所之願樂皆從三尊合德魂魄内通致給神官玉女玉童有惡某者刑之電風姦謀斷舌裔之十方祝畢存心中忽然忘身良乆而下據斗之道旣畢又兩足俱上隂精星以左手撫心以右手指眞人星閉氣三息叩齒三通咽液三過名曰攀魁入太微微祝曰隂精玄素華闕生門中有玉帝北極至尊鳯繡華領龍翠碧裙腰虎佩鈴扶芝丹冠號曰隂精太上之君授某隱書使歩一元攀魁上升遂遊靈關外拘七魄内制三魂魄鍊俗累魂寳胎神魂魄守身與之俱仙飛行上清還氣嬰顔所向如心萬欲無難有惡某者形死三官威攝六天役使羣神攀魁之道旣畢乃又兩足俱上弼星并足向眞人星四拜畢跪閉氣四息叩齒四通咽液四過名曰接眞跪微呪曰太極九精上元明眞正機把衡吐納紫煙金光王映威照十天攝御三光調陽和隂理元賦氣攺易故新上治中宿玄關之玄金室玉戸北掖四便出駕八景浮遊太元龍錦鳯衣虎翠飛裙絳旍緑帔紫羽七縁腰帶神符首戴扶冠上棲九虚下翔天淵自號玉皇九天極眞哀某好道授某隱篇躬登弼魁朝拜靈君乞願丹書爲生之縁治天三五飛行八玄五藏自生上品飛仙得翼玉帝後聖之臣位高大夫乗雲飛輪所願皆合衆邪莫干有惡我者暴形破門接眞之道旣畢乃又兩足俱上玄冥星以右手撫心以左手指丹元星閉氣三息叩齒三七通咽液三過名曰歩斗微祝曰洞天神光廻隱玄冥氣盈太虚去來無形隱天藏地周灌無生忽登天綱上歩紫庭北視雷房南顧電城眩惑萬變非復故形恍惚流景觸手立成欲求藏身得我姓名虚元傲兀九變玄冥坐起六甲謁署六丁賜某隱書歩斗行星仰見上皇披丹巾青手把靈光腰帶玉鈴上乞飛仙與天俱生名書太微浮化上清下乞變化藏景録形萬事如顧前由皆平有惡我者戮以神兵太極眞經金根上文曰子登玄冥歩半隱形子欲變化當得我名廻天動地萬物立成歩玄冥時及欲隱時當心存此名字歩斗之道旣臯乃又兩足俱上丹元星以左手撫心以右手指北極星閉氣三息叩齒三通咽液三過名曰躡紀微祝曰太上九臺丹元玄紀外管北極内正天理金闕映外玉庭耀裏中有至尊號曰赤子治在丹元絳房之中翠雲繡華龍帔虎裳右執皇籙左把魁綱足躡景雲首巾紫冠右佩流鈴左帶玉璫賜某隱書躡紀遊行上乞飛仙乘玄駕龍書名丹臺太極玉堂所向所求福祿來迎有惡某者願爲滅亡給侍神官玉女玉童躡紀之道旣畢乃又兩足俱上北極星以右手撫心以左手指天關星閉氣三息叩齒三通咽液三過名曰歩綱微祝曰玄上太微北極紫蓋下有太眞遊翔九外翠華飛裙金鈴青帶腰佩玉光玄雲奄藹賜某隱書上行七氣登清戯煙眞人合㑹乞丐飛仙書名丹室所向如願無災無害有惡我者令彼傷敗歩綱之道旣畢乃又兩足俱上天關星以右手撫心左手指天關閉氣三息叩齒三通咽液三過名曰乘龍微祝曰太上七極紫微絶辰寳玄金房外有玉門周運九宫調和天關中有尊神號曰紫皇授某隱書𢹂某乗龍上遊九天下飛地元景雲丹輿玄華翠裳腰佩龍䇿頭巾虎文包生萬物教訓飛仙脫某死名天地長存乘龍歩斗所向受恩有惡我者風刀火然乘龍之道旣畢乃又兩足俱上輔星閉氣一息叩齒三通咽液一過名曰遊行三命旋歩天英也微祝曰太極輔星精在紫關養生育命寳守神魂金房再開奉見輔君賜某隱書使某遊旋列名聖皇飛仙九天巾金佩眞出入洞門遊行三命旣畢乃廻行詣弼星兩足俱上閉氣一息叩齒三通咽液一過名曰徘徊三陽出入三生微祝曰太虚泥丸紫宫天尊玄空眞紐爲帝之先在道玉皇在身泥丸馮感歘生氣貫霄元採入明堂彊胎益魂朱山再開奉近靈元左採日華右掇月根流火萬丈金羅碧裙腰帶天骨首戴華冠賜某隱書得行天關乞願飛仙役使萬神萬向皆㑹福徳如山行事時皆北向執隱書而爲之也亦可按文視星不必闇誦而作也春歩七星名曰歩三綱夏歩七星名曰躡六紀秋歩七星名曰行六害冬歩七星名曰登六絶太上飛行九晨玉經終
