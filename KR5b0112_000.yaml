body:
  text: 太上飛行九晨玉經遜十太上大道君告北極真公曰吾昔遊於北天䇿駕廣寒足踐華蓋手排九元逸景雲宮遨戲北玄逍遙朔隂之館賞于洞毫之門盻璇璣以召運促劫㑹以儛輪歎萬物之凋衰俯天地之長存乃覺九星之竒妙悟斗魁之至靈也夫九星者實九天之靈根日月之明梁萬品之淵宗也故天有九氣則以九星為其靈細地有九州則以九星為其神主人有九孔則以九星為其命府隂陽九宮則以九星為其門戶五嶽四海則以九星為其淵府五九參列綱維無窮制御天宿回轉三辰調理四五致天地得存萬品之所宗神仙之所憑夫天無九星則無以為高清地無九星則無以為至靈人無九星則九孔不明上帝兼之以通真神仙憑之以得成五行乘之以致度物禀之以得生也天清地靜則九星煥明天激地否則九星翳昏璇璣召劫度之期天關運五行之氣輪空洞之大輻促九天之應㑹是以神光轉灼玄監萬生傍行越位以告災祥天地所以有大運之交百六應符皆九星緯轉數終所以隂陽勃蝕二氣否激天翻地覆九海冥一金玉化消毫末不失也悉九星之所回璇璣之所促明天地之用玄綱之妙得其中則有空常隱步藏景逃形變化三辰萬物立成黑㸃隱淪二十五名其趣幽微祕不下傳上有九晨華君中有九皇夫人魂精魄靈皆九斗之威神吐煥七曜之光流映九天之門洞朗幽虛無毫不彰也其星陽芒則為流金火鈴隂芒則為豁落七元皆高上之靈䇿元始之威章也龍飛尺素之訣隱諱口口之中列帛華晨之下羊鴈禮天以招真則玄光曲照于盟場九晨下降於靈宇夫人歡恱於寢席玄斗記名於隱書有知此道存之便足以免大劫之㑹度洪災於甲申也修之二七年便得晏鴻翮而騰翔斥紫霄而升晨也此玉清之上道不比上清之中仙也玉清則上清之高真上清則太清之高神太清則飛仙之高靈凡行玉清之道出則諸天侍軒給玉童玉女各三千人建三七色之節駕紫雲飛軒十二瓊輪前導鳯歌後從玄鈞六師啓路飛龍翼轅其位准高仙列圖玉清行上清之道出則五宿侍衛給玉童玉女各一千五百人建紫毛之節駕飛雲丹輿前吹鳯鸞後奏天鈞玄龍啓道五帝參軒位准上清左右位卿行太清之道出則五帝侍衛給玉童玉女各八百人建五色之節駕龍輿飛煙前嘯九鳯後吹八鸞白虬啓道太極參軒故真中有髙卑玄中有階次也玉清之道玄逺絶邈不比中真及飛仙之徒九星上法玄映之道吾昔受之於元始于今七億萬劫經天地成敗萬品衰滅而其道獨存今猶修之於雲景之上而不能忘之於時節者意玩此道高妙愛樂夫人接遇也况來生始學飛晏之舉而不知幽尋步空之法何由得披重霄之門觀天地之始終乎既無此道與九晨乖域夫人絶遊也徒有玄名帝録超卓髙騰正可得䇿駕雲龍遊盻五嶽但不死而巳如此望踐斗魁旋步華晨騰景玉清當未有期也子方當匡御劫運封掌十天科簡玄録理判神仙宜受此法以綜萬生今出相付子祕而修焉九晨真人曰行飛步之道先一日沐浴齊淨是日於中庭布星圖隨斗建也北向長跪燒香於玄冥星下叩齒三十六通閉眼存歲星在左脅太白星在右脅熒惑星在頭上辰星在臍下鎮星在心次覆衣九星先舉左手屈於頭上如斗勢存陽明星在左手掌中隂精星在左肘上真人星在左乳上玄冥星當心故燒香於玄冥星下而啓事因心而應天明也丹元星在右䏶上北極星在右膝頭上天關星在右足胚上輔星在臍下弼星在頭上畢微呪曰衣天斗戴金巾乘魁剛入斗門朝真人拜華晨二十八宿覆絡我身乘空𡵯虛飛升自然畢咽氣九過止次舉右手如斗勢臨頭上存陽明還右手掌中隂精星右肘上真人星在右乳上玄冥星當心上丹元星在左䏶上北極星在左膝頭上天關星在左足胚上弼星在左目上輔星在右目上畢微呪曰我乘天剛步九元履斗魁行飛仙得天心萬神歡隱形藏景變化萬端敢有干試收繫斗門掃除不祥正真明分左煥火鈴右輝靈幡威光萬里嘯命立前玉帝所呪靡不如言畢咽氣十六過止次乘斗旋行斗星之外步斗魂魄從天樞星上對陽明次登天璇天璣以次周於隱元往反三過畢於隱元星上歌三洞飛空章而登陽明也便立思夫人形象如左也第一天樞星則陽明星之魂神也天樞星威而不曜光而不照潜洞太虛圍九百二十里對陽明星之西北門其星則號元斗宫魁精玄上真皇夫人姓明通諱罌玄真名上精頭建飛雲華頽之髻餘髮散至腰衣紫黃青三色之䙱帶九鈴之綬口恆吐青氣之光以注於陽明星上以明星之煥也修飛步之道當思夫人姓諱形像然後呪則魂神澄正明星歡恱天光洞映使魂影俱飛登晨也并足上天樞星上對陽明星左手撫心右手指陽明星叩齒九通咽液九過閉氣三息而微呪曰天妃九星凝氣結真七曜纏絡號曰玉晨上建華蓋下躡斗魁身乘天機飛步瓊軒魂精魄靈與形合仙保元日月天地長存隨運變化夫人齊連上升九天浮景自然畢閉氣三息次左足躡天璇進右足與左足并通氣第二天璇星則隂精星之魂神也天璇星景而逺映照而不煥潜洞太虛圍五百五十里對隂精星之西門其星則號玄斗宮虛精上玄皇夫人姓玄鏡諱鬱勃光真名金歸頭建飛雲華頽之髻餘髮散至腰衣飛錦羅裙鳯文錦帔帶靈飛紫綬口恆吐黑氣之光以注於隂精星上以明星之暉曜也修飛步之道當思夫人姓諱形像并足上天璇星上對隂精星左手撫心右手指隂精星叩齒九通咽液九過閉氣九息而微呪曰北玄皇靈九上開清玉華潜映緯絡紫庭今日飛步萬道通明魂魄澄正安附我形無使飛翔同升北星上吸玄精飲以玉泉變化九微保命天靈畢閉氣三息次進左足躡天璣星次右足來並通氣第三天璣星則真人星之魄精也天璣星猛而不顯暉而不曜潜洞太虛圍七百七十里對真人星之東南門也其星則號上精宮靈妃元皇夫人姓常明諱化雲真名流爓頭建晨嬰寶冠衣飛雲明光錦䙱帶六山飛晨之綬口恆吐黃氣之精以注真人星上以明星之曜也修飛步之道當思夫人姓諱形像並足上天機星上對真人星右手撫心左手指真人星叩齒九通咽液九過閉氣十二息而微呪曰靈妃元皇九星中真上理璣度總監諸天下試羣方遊景紫煙是日上吉黃道敷陳潤流九外曲灑我身飛行禹步上入帝晨與皇同眉永享劫年畢閉氣三息次進左足躡天權星進右足與左足並通氣第四天權星則玄冥星之魄精也天權星微而隱隱而同映潜煥太虛圍八百里對玄冥星之東門也其星則號綱極宮上靈神妃華皇夫人姓開生諱運明真名嬰關頭建七稱之冠衣緋羅鳯文之䙱帶金真玉光口恆吐赤氣之精以注玄冥星上以明星之煥曜也修飛步之道當思夫人姓諱形像並足上天權星上對玄冥右手撫心左手指玄冥叩齒九通咽液三過閉氣三息而微祝曰神妃上靈號曰華皇安鎮華蓋北上之宮左侍玉女右衛靈童道引七精九暉之光為我致真飛步天剛使我魂魄俱升帝堂畢閉氣三息次進左足躡玉衡進右足與左足並通氣第五王衡星則丹元星之魂靈也玉衡星大而默踊而不煥潜洞太虛圍七百二十里對丹元星東北門也其星則號紀明宮北上金蓋中皇夫人姓元方諱神武真名勃頭建紫晨飛華之冠衣九色之䙱帶神虎玉文口恆吐白氣之光以注丹元星上以明星之暉也修飛步之道當思夫人姓諱形像並足上天衡星上對丹元星右手撫心左手指丹元流齒三通咽液三過便閉氣三息而微呪曰皇華中妃上元所居九斗吐暉精煥八竭流煙鬱勃散靈朱廬使我魄靈天地同符形魂俱升駕空䇿虛玉光緒絡丹軿紫輿飛行北上參受隱書畢閉氣三息次進左足躡闓陽星進右足與左足並通氣第六闓陽星則北極星之魄靈也闓陽星朗而潜照暉而不煥洞微太虛圍七百七十里對北極之下開北洞之門也其星則號紫極宮安上晨華元皇夫人姓王元諱根華真名冥㑹頭建玉晨進賢之冠衣飛青羽䙱帶流金火鈴口恆吐緑氣之精以注北極星上以明星之曜暉也修飛步之道當思夫人姓諱形像拜足上闓陽星上對北極星而左手撫心右手指北極叩齒三通咽液五過閉氣五息而微呪曰九天上帝黃華之宗運轉璇璣總輪八方使我飛步躡紀天綱反覆交並三五縱橫通靈八微羽衣玄黃龍輿玉景飛行太空長享眉壽天地同功畢閉氣五息次左足躡搖光星進右足並通氣第七搖光星則天關星之魂太明也搖光星則光轉空洞回旋天關也潜煥太虛圍九百里上對天關星之南門下對北極星也其星則號運天宮玉華靈皇夫人姓度元諱終㑹真名啓光頭建飛華頽雲之髻餘髮散至腰衣七色夜光雲錦之裙九色錦帔九天威靈玉䇿口恆吐赤氣之精注天關星上以明星之大光也修飛步之道當思夫人姓諱形像並足上搖光星上對天關星而左手撫心右手指天關叩齒九通咽液九過閉氣三息而微呪曰天地回轉七光大明旋輪九氣上應玉清中有夫人號曰華靈玄映九外無毫不生是日良吉飛步紫庭使我魂魄安附身形變化空洞出幽入冥天地同輪萬劫不傾保仙上元九晨齊精畢閉氣七息次左足躡洞明星進右足並通氣第八洞明星則輔星之魂精陽明也洞明星則光回諸天總輪上宿流暢太虛圍九百九十里上對輔星西南門也在天關之上梁北極之陽芒也其星則號空真宮太明常皇夫人姓幽升諱無韻真名空變頭建飛雲華頽之髻餘髮散至腰衣飛羅文䙱帶九光之綬口恆吐青氣之精注於輔星之上以常陽大光也修飛步之道當思夫人姓諱形像並足上洞明星上對輔星而右手撫心左手指輸星叩齒九通咽液九過閉氣三息而微呪曰三五飛行天地開張九元回綱合紐上京天真散靈萬道溢昌夫人曲映是日吉良飛步斗魂旋行玉綱頭戴華蓋足履常陽遊戲三清變化萬方保仙自然享壽無窮畢閉氣十二息次左足躡隱元星進右足並通氣第九隱元星則弼星之魂明空靈也隱元星則隱息華蓋之下潜光曜於空洞之中圍九百九十里上對弼星之東南門也其星則號元寶宫空玄變靈上皇夫人姓冥通諱萬先真名常陽頭建飛雲七稱玉冠衣青文錦䙱帶九光夜燭口恆吐黑氣之精注於弼星之上以明煥隱洞之光也修飛步之道當思夫人姓諱形像並足上隱元星上對弼星而左手撫心右手指弼星叩齒十二通咽液一過閉氣一息而微呪曰上步天綱飛行羽門出入三生逃身隱淪變化形影千合萬分神安氣鎮鍊度仙魂舉體同飛衣服錦裙流鈴交落身佩虎文嘯咤五帝䇿駕景雲上造北辰朝謁皇君畢閉氣一息止還並足上天樞星上單步往反三周不須復存思呪說也步斗魂事畢存呪正初登星一過行之爾往反三過畢還立天樞星上向陽明星而歌誦徘徊遊行九晨羽章三篇畢便登綱上陽明星上行飛步也羽章詞如左雲綱落天紀九斗翠玉虛紫蓋重霄嶺玄精朗八嵎上有九晨賔吟詠隱與書飛步遨北漢長齡天地居控轡玄羽臺飛行九元所洞虛深幽邃雲綱乘空舉下有採真士仰照玉晨府三周陽明上九回入洞野高步登帝尊長歌龍飛語玉霄映北朔瓊條翠隱柯空生九靈臺煥精曜太遐天關運重冥劫㑹屢經過乘我羽行駕飛步織女河保靈空常化永忘天地多此三章出玉清上宮諸九陽玉童九華王文皆恆歌誦之於華晨之上以和形魂之交暢啓靈真於幽關也凡修飛步七元行九星之道無此歌章皆不得妄上天綱足躡玄斗也犯之九星則執子魂魄閉於斗綱之下也令人猖狂失性嗔怒妄興不出三年無不喪身非道不欲使人得仙而人不能明道淵源耳如此豈可不詳而行焉九星則九天之根玉清之明精九魂則九星之明靈人徒知步七星之妙而不知九星魂魄之至靈也非七星不欲運人上斗而人身魂神畏斗星之靈魄不敢隨人而騰空也欲修飛步之道宜知斗星之魂魄九皇夫人內名空常之隱訣也而按圖修行豈當不得飛登北元上謁華晨者哉但此道高妙玉清寶祕不行中仙鮮有得者知其法則九星內映夫人降席斗魂感恱則共攜兆而升入九元之內宮陽明星天之太尉司政主非上總九天上真中監五嶽飛仙下領後學真人天地神靈功過輕重莫不𨽻焉星圍九百二十里皆琉璃水晶中有玉樹青實金翅之鳥棲宿其上自生青精玉芝食之一口壽九萬年星有九門有四光芒皆爓照九億萬里中上有青城玉樓據斗真人號曰太上宫青城玉樓九晨君姓上雲諱法嬰容字董洞陽搖天槌頭建九晨玉冠衣青羽飛裳手執斗中玄圖坐玉樓之中有玄名玉録當得知九晨君內諱知者玉晨下映明星玄降修其道飛行太空升入九門之內也修飛步之道當先於陽明星上右手撫心左手指天東北閉氣九息叩齒九通咽液三過閉眼思九晨君姓諱形像留立陽明星上便微祝曰飛天九晨上據玄魁威振八煥司政紏非今日飛步萬道通開九真齊景天轉地回鬼謀戳頸人逆斬摧三綱所捕逆者將衰神靈侍衛享福巍巍得天之心骨化形飛手攀七綱足踐九扉雲行雨步上升太微畢左轉陽明星上九回立向鬼門閉氣三息轉左足躡隂精進右足並於隂精星上通氣隂精星天之上宰主祿位上總天宿下領萬靈及學仙之人諸學道及兆民宿命祿位莫不𨽻焉星圍五百五十里亦皆琉璃水精中有玉樹黑實金翅之所棲自生玄芝玉飴食之一口得壽五萬年星有五門門有四光芒爓照九億萬里中上有五色玉樓攀魁真人號曰中元宮五色玉樓北上晨君姓育嬰諱玄上瓫字昌陽文激明光頭建玄精玉冠衣玄羽飛裳手執五色羽節坐玉樓之中若有玄名朱臺當得知上晨君內諱知者則北上下映隂精玄降修行其道則飛行太空升入五門之內也修飛步之道當先於隂精星上左手指本命右手撫心閉氣五息叩齒五通咽液五過閉目思北上晨君諱字形像留立隂精星上便微呪曰玄晨北靈五氣上精體隱六紀心藏景星日月俠映三光飭形今日元吉步綱紫庭上開天戶受福朱靈享祚無極祿位尊榮萬願交覆所向利貞騰飛華蓋遨翔玉清上詣北晨九真齊軿畢左轉隂精星上五回向本命上立閉氣三通轉左足躡弼星進右足並通氣不得躡真人星但躡弼星耳真人星天之司空主神仙上總九天高真中監五嶽靈仙下領學道之人真仙之流莫不𨽻焉星圍七百七十里亦皆琉璃水精中有玉樹黃實金翅之所棲自生黃精玉芝食之一口得壽三千萬歲星有十二門門有四光芒爓照九億萬里中上有黃臺玉樓真人號曰真元宮中黃臺玉樓主仙華晨君姓歸㻂諱妙隂光字通度元度凝脂頭建飛晨寶冠衣青羽飛裳手執斗中青籙坐玉樓之中若有玄名方諸當得知華晨君內諱知者則華晨下映真人玄降修行其道則飛行太空升入十二門之內也修飛步之道皆不得躡真人星也當並足弼星上所謂偃息華蓋者也北老真公曰子欲騰身勿干真人子欲飛行勿枉天綱子欲神仙當拜華晨行道當避真人星立弼星之上拜真人朝華晨而求飛空也弼星曰空輔星曰常常者常陽空者隱藏其有諱不得傳於人口可於華晨之下羊鴈禮天裂素盟而傳得此祕諱心存而行之輕泄七祖負考風刀也當於弼星上右手撫心左手指西北閉氣九息叩齒九通咽液九過閉眼思主仙華晨君姓諱形像留立真人星上便微呪曰太微通真弼輔華晨吐煥九精結氣紫煙飛霞流映光曜十天上理元衡下攜神仙今日飛𡵯請禮真人一求空行二乞隱身三願上升北掖四便龍衣羽服錦帔青裙駕乘八景浮遊九玄得入天宿與帝同軒畢左回弼星七過向真人閉氣三息轉左足躡玄冥進進足並通氣玄冥星天之遊擊主伐逆上總九天鬼神中領北帝三官下監萬兆伐逆不臣諸以凶勃莫不𨽻焉星圍八百里亦皆琉璃水精中有玉樹赤實金翅之所棲自生丹芝流瑛食之一口得壽八千萬年星有三門門有四光芒爓照九億萬里中上有朱臺玉樓出斗真人號曰紐幽宫中朱臺玉樓玄上飛蓋晨君姓冥樞諱定宣覺字法明度搖天柱頭建三華寶晨冠衣丹錦飛裳手執命靈之節坐玉樓之中若有玄名玉格當得知飛蓋晨君內諱知者則飛蓋下映玄冥玄降修行其道則飛行太空升入三門之內也修飛步之道當先於玄冥星上右手撫心左手指天閉氣九息叩齒三通咽液三過閉眼思飛蓋晨君姓諱形像留立玄冥星上便微呪曰天真行道步景藏形七元煥落九晨齊並手把天衡足踐飛星左輔火甲右御朱兵威振十天流煥上清先戮謀議後伐妖精敢有干正斬以刀刑三綱所制莫不伏聽變化往反適心華庭乘空飛步上造帝靈畢左回三轉向天閉氣三息轉左足踐丹元星進右足並通氣丹元星天之斗君主命録籍上總九天譜籙中統鬼神部目下領學真兆民命籍諸天諸地莫不總統星圍七百二十里亦皆琉璃水精中有赤樹白實金翅之所棲自生金精冶鍊之膏食之一口得壽七萬年星有七門門有四光芒爓照九億萬里中上有素臺金樓躡紀真人號曰綱神宮中素臺金樓躡紀真人金魁七晨君姓上開諱冥通光字朱煥元變五道頭建七寶飛天冠衣白錦飛裙手執青元籙籍坐金樓之中若有玄名崑臺當得知七晨君內諱知者則七晨下映丹元玄降修行其道則飛行太空升入七門之內也修飛步之道當先於丹元星上右手撫心左手指天關閉氣七息叩齒三通咽液三過閉眼思七晨君姓諱形像留立丹元星上便微祝曰飛行躡紀上步丹元乘魁落宿呼命斗魂削死勒生青白簡分三合成道年命長延享利眉壽齊生華