用流丹房上升文昌展轉九道位為九老行之二十年受書為上清真人几人望七星為近不知步之甚逺道士苟知天綱之可步而不知魂魄不追其身非身之不將魂魄也魂魄畏七星之威不敢追身而上行也故三魂不攝七魄蕩散徒以空尸步綱而神不我從實徒勞也子欲步綱澄心虛靜不思哀憂不念熒味於是回行三匝登星啓祝使魂魄二神俱過靈關豁然縱體奄忽自忘盛潔乃步恆如蹈空一年辟非二年辟兵三年辟死四年地仙千害萬邪衆莫敢干自此以往福慶無端致神使靈驂駕飛龍太極賜芝玉帝給童行二七年為上清真人步法勿橫行干綱也直畫連星之界分曰綱也犯橫天綱皆伐斷天道大禁也步綱勿躡真人星大忌犯此二者皆脫巾叩頭謝綱象以布帛為之長九尺廣六尺羅列星位於帛上以青筆為星丹筆為綱盛之潔箱每欲施行燒香出之侍書有玉女七人衛星有玉童七人婦人步綱用絳帛太微帝君教授步天綱之經謹按神真上法先燒香於行事之所閉氣七回行斗星之外三匝始於隂精匝於陽明畢乃通氣始得足躡於七星身上步於陽明耳於是向陽明星又閉氣而心祝曰陽明大魁玄極文昌使某魂魄俱遊天綱祝畢乃左足躡陽明又進右足躡隂精心祝曰隂精北極太上璇璣使某魂魄俱過神津次在足躡北極心祝曰北極天光回適玄辰使某魂魄俱至玄關次右足躡天關進左足前與并乃通息大祝之一閉息不竟綱者可於丹元星上通息更閉微祝曰金木水火土五行相推七星煥煥天綱最威輔星鎮盛弼星却衰九真太上太極太微三府玉帝三尊辟非天動地轉魂魄相隨使我飛仙真光徘徊名入金房玉門乃開乘龍陟空日月同輝遊行上清鳴鈴翠衣左躡流電右御奔雷地上萬邪伏死敢追惡心視我使爾斬摧帝命玉女營侍以歸魂真魄神合形升飛倒行法止於天關倒向北極微祝曰太上元辰華蓋紫靈北極玉房藏景化精太微玄臺九真玉城願某飛仙得行雲庭反步天綱魂魄俱生乘龍華宫得道之英左佩玉璫右腰金鈴虎帶龍裙嘯攝天兵乘景三素飛登上清祝畢乃閉氣舉左足躡北極右足躡丹元次舉左足躡玄冥前右足與左足拜而向真人之星通息微祝曰太極九精上皇高真出登元清入隱玄隂育某長某使某好仙玉臺忽開金堂八門乞某佩書絳龍青裙上佐紫微後聖之君乘十飛龍玄蓋景靈列名玄圖日月同并祝畢因又閉氣左足躡弼星進右足躡隂精又進左足躡陽明前右足與左足并乃通息微祝曰天魁正陽斗運低昻前轉元機後動靈綱制魄以寧拘魂以康魂魄與身俱行天堂向見金闕髙上太皇右扶仙母左扶仙公紫翠飛華龍袍虎裳帶真巾玉項生圓光手把神鈴腰佩金鐺口詠洞真七變妙章光自虛無生而為王飛行九道據斗攀綱前從太一後從玄郎告某口訣坐在立亡反行至要位為仙卿五藏自生與天相迎所願如念所求尅昌萬邪伏害易地隱藏惡我天伐水滅火喪反行法又閉氣右回斗星之外三匝始於陽明匝於陽明通息祝曰高上太真七耀至尊反行尋生上步天元使某飛仙得入紫門因又閉氣左足躡陽明右足躡隂精先前右足躡玄冥左足躡丹元次右足躡北極左足躡天關右足前與拜乃通息祝曰七變返旋上行玉宿六紀輔我三綱合步玉帝左盻髙上右顧教我乘星騰登玄路乞賜飛仙不死之祚遊行上清乘華三素金青翠裙出入九舍北皇見揖南真見謝名書仙臺千變萬化得友聖君太平輔佐所願從心萬事成就有惡我者刀刑火墓順行倒行反行三道都畢乃又舉兩足俱上陽明星以右手撫心左手指玄冥星閉氣三息叩齒三七咽液三九名曰據斗微祝曰陽明太素立辰黃房中有大神左拊上皇右把高真龍銜翠衣飛錦虎文腰帶玉符首戴蓮冠出無入虛金真玉光靈尊巍峩號曰陽明足躡朱烟口詠洞章賜某隱書見教步綱周行三復據斗自忘使某飛仙超虛浮空名書上清乘玄駕龍意有所之願樂皆從三尊合德魂魄內通致給神官玉女玉童有惡某者刑之電風姦謀斷舌裔之十方祝畢存心中忽然忘身良久而下據斗之道既畢又兩足俱上隂精星以左手撫心以右手指真人星閉氣三息叩齒三通咽液三過名曰攀魁入太微微祝曰隂精玄素華闕生門中有玉帝北極至尊鳯繡華領龍翠碧裙腰虎佩鈴扶芝丹冠號曰隂精太上之君授某隱書使步一元攀魁上升遂遊靈關外拘七魄內制三魂魄鍊俗纍魂寶胎神魂魄守身與之俱仙飛行上清還氣嬰顔所向如心萬欲無難有惡某者形死三官威攝六天役使羣神攀魁之道既畢乃又兩足俱上弼星并足向真人星四拜畢跪閉氣四息叩齒四通咽液四過名曰接真跪微呪曰太極九精上元明真正機把衡吐納紫煙金光王映威照十天攝御三光調陽和隂理元賦氣攺易故新上治中宿玄關之玄金室玉戶北掖四便出駕八景浮遊太元龍錦鳯衣虎翠飛裙絳旍緑帔紫羽七緣腰帶神符首戴扶冠上棲九虛下翔天淵自號玉皇九天極真哀某好道授某隱篇躬登弼魁朝拜靈君乞願丹書為生之緣治天三五飛行八玄五藏自生上品飛仙得翼玉帝後聖之臣位高大夫乘雲飛輪所願皆合衆邪莫干有惡我者暴形破門接真之道既畢乃又兩足俱上玄冥星以右手撫心以左手指丹元星閉氣三息叩齒三七通咽液三過名曰步斗微祝曰洞天神光回隱玄冥氣盈太虛去來無形隱天藏地周灌無生忽登天綱上步紫庭北視雷房南顧電城眩惑萬變非復故形恍惚流景觸手立成欲求藏身得我姓名虛元傲兀九變玄冥坐起六甲謁署六丁賜某隱書步斗行星仰見上皇披丹巾青手把靈光腰帶玉鈴上乞飛仙與天俱生名書太微浮化上清下乞變化藏景録形萬事如顧前由皆平有惡我者戮以神兵太極真經金根上文曰子登玄冥步半隱形子欲變化當得我名回天動地萬物立成步玄冥時及欲隱時當心存此名字步斗之道既臯乃又兩足俱上丹元星以左手撫心以右手指北極星閉氣三息叩齒三通咽液三過名曰躡紀微祝曰太上九臺丹元玄紀外管北極內正天理金闕映外玉庭耀裏中有至尊號曰赤子治在丹元絳房之中翠雲繡華龍帔虎裳右執皇籙左把魁綱足躡景雲首巾紫冠右佩流鈴左帶玉璫賜某隱書躡紀遊行上乞飛仙乘玄駕龍書名丹臺太極玉堂所向所求福祿來迎有惡某者願為滅亡給侍神官玉女玉童躡紀之道既畢乃又兩足俱上北極星以右手撫心以左手指天關星閉氣三息叩齒三通咽液三過名曰步綱微祝曰玄上太微北極紫蓋下有太真遊翔九外翠華飛裙金鈴青帶腰佩玉光玄雲奄藹賜某隱書上行七氣登清戲煙真人合㑹乞丐飛仙書名丹室所向如願無災無害有惡我者令彼傷敗步綱之道既畢乃又兩足俱上天關星以右手撫心左手指天關閉氣三息叩齒三通咽液三過名曰乘龍微祝曰太上七極紫微絶辰寶玄金房外有玉門周運九宫調和天關中有尊神號曰紫皇授某隱書𢹂某乘龍上遊九天下飛地元景雲丹輿玄華翠裳腰佩龍䇿頭巾虎文包生萬物教訓飛仙脫某死名天地長存乘龍步斗所向受恩有惡我者風刀火然乘龍之道既畢乃又兩足俱上輔星閉氣一息叩齒三通咽液一過名曰遊行三命旋步天英也微祝曰太極輔星精在紫關養生育命寶守神魂金房再開奉見輔君賜某隱書使某遊旋列名聖皇飛仙九天巾金佩真出入洞門遊行三命既畢乃回行詣弼星兩足俱上閉氣一息叩齒三通咽液一過名曰徘徊三陽出入三生微祝曰太虛泥丸紫宫天尊玄空真紐為帝之先在道玉皇在身泥丸馮感歘生氣貫霄元採入明堂彊胎益魂朱山再開奉近靈元左採日華右掇月根流火萬丈金羅碧裙腰帶天骨首戴華冠賜某隱書得行天關乞願飛仙役使萬神萬向皆㑹福德如山行事時皆北向執隱書而為之也亦可按文視星不必暗誦而作也春步七星名曰步三綱夏步七星名曰躡六紀秋步七星名曰行六害冬步七星名曰登六絶太上飛行九晨玉經終
